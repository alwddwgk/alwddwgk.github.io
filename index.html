<!DOCTYPE html>
<html lang="us">
<head>
    <meta charset="UTF-8">
    <title></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(199deg, #4a2773 0.0%, black 100.0%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            perspective: 1000px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 350px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            transition: transform 0.5s;
        }

        .glass-card:hover {
            transform: scale(1.05) rotateY(10deg);
        }

        .profile-image img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
            object-fit: cover;
        }

        .profile-info h1 {
            color: white;
            margin: 15px 0 5px;
        }

        .profile-info h2 {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
        }

        .profile-info p {
            color: rgba(255, 255, 255, 0.6);
            padding: 0 20px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .social-icon {
            color: white;
            font-size: 24px;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .social-icon:hover {
            transform: scale(1.2);
        }

        .fa-github {
            color: #ffffff;
        }

        .fa-linkedin {
            color: #ffffff;
        }

        .fa-telegram {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <div class="profile-image">
                <img src="avatar.jpg" alt="avatar">
            </div>
            <div class="profile-info">
                <h1>alwddw</h1>
                <h2>HTML/CSS Developer</h2>
            </div>
            <div class="social-links">
                <a href="https://github.com/alwddwgk" target="_blank" class="social-icon">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://www.linkedin.com/in/alexey-sergeev-09ab15351?trk=contact-info" target="_blank" class="social-icon">
                    <i class="fab fa-linkedin"></i>
                </a>
                <a href="https://t.me/alwddwk" target="_blank" class="social-icon">
                    <i class="fab fa-telegram"></i>
                </a>
                <a href="mailto:alwddw@icloud.com" class="social-icon">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
